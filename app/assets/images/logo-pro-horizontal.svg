
<svg width="800" height="400" viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sharp gradient for momentum -->
    <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9900;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="240" height="120" fill="#0f1115"/>
  
  <!-- THE "ACTION" ICON: The Pro-Arrow -->
  <g transform="translate(20, 35)">
    <!-- Measurement "Tick" Foundation -->
    <path d="M0 0 V50 H10" fill="none" stroke="#444" stroke-width="1.5"/>
    <path d="M50 50 V0 H40" fill="none" stroke="#444" stroke-width="1.5"/>
    
    <!-- The Velocity Arrow / "D" Shape -->
    <!-- Represents moving from measure to close in one smooth motion -->
    <path d="M10 10 L45 25 L10 40 Z" fill="none" stroke="#FF6600" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Precision Crosshair (The "Measure" start point) -->
    <circle cx="10" cy="25" r="4" fill="none" stroke="#00d2ff" stroke-width="1.5"/>
    <line x1="10" y1="20" x2="10" y2="30" stroke="#00d2ff" stroke-width="1"/>
    <line x1="5" y1="25" x2="15" y2="25" stroke="#00d2ff" stroke-width="1"/>
    
    <!-- The Flash (The "Close" point) -->
    <circle cx="45" cy="25" r="2" fill="#fff">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- TEXT IDENTITY -->
  <g transform="translate(85, 52)">
    <text font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="900" fill="#ffffff" letter-spacing="-0.5">Dimensions<tspan fill="#FF6600">Pro</tspan></text>
    
    <!-- THE SALES TAGLINE (Priming the Close) -->
    <text y="18" font-family="monospace" font-size="6" font-weight="bold" fill="#00d2ff" letter-spacing="1.5">MEASURE • QUOTE • <tspan fill="#fff">CLOSE</tspan></text>
    
    <!-- Momentum Line -->
    <rect y="24" width="125" height="1" fill="#333"/>
    <rect y="24" width="40" height="1.5" fill="#FF6600"/>
  </g>
</svg>
