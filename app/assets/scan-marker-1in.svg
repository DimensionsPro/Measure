<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="8.5in" height="11in" viewBox="0 0 2550 3300">
  <rect width="2550" height="3300" fill="white"/>

  <!-- Title -->
  <text x="1275" y="180" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="64" fill="#111">
    Dimensions Scan Marker Sheet (Print at 100% scale)
  </text>
  <text x="1275" y="250" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" fill="#333">
    Do NOT fit-to-page. Disable scaling. Verify with the 1" ruler below.
  </text>

  <!-- 1-inch ruler -->
  <g transform="translate(430,360)">
    <text x="0" y="-20" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#111">Calibration ruler (must measure exactly 1 inch)</text>
    <rect x="0" y="0" width="300" height="14" fill="#111"/>
    <line x1="0" y1="-12" x2="0" y2="30" stroke="#111" stroke-width="4"/>
    <line x1="300" y1="-12" x2="300" y2="30" stroke="#111" stroke-width="4"/>
    <text x="150" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#111">1.000 in</text>
  </g>

  <!-- Marker tiles: each outer square is exactly 1 inch (300 px at 300 DPI) -->
  <g id="marker-template">
    <!-- outer black border -->
    <rect x="0" y="0" width="300" height="300" fill="#111"/>
    <!-- white quiet zone -->
    <rect x="26" y="26" width="248" height="248" fill="#fff"/>
    <!-- asymmetric pattern for orientation -->
    <rect x="48" y="48" width="72" height="72" fill="#111"/>
    <rect x="180" y="48" width="72" height="72" fill="#111"/>
    <rect x="48" y="180" width="72" height="72" fill="#111"/>
    <rect x="132" y="132" width="36" height="36" fill="#111"/>
  </g>

  <!-- Place 20 stickers -->
  <g transform="translate(360,700)">
    <!-- row 1 -->
    <g transform="translate(0,0)"><use href="#marker-template"/></g>
    <g transform="translate(360,0)"><use href="#marker-template"/></g>
    <g transform="translate(720,0)"><use href="#marker-template"/></g>
    <g transform="translate(1080,0)"><use href="#marker-template"/></g>
    <g transform="translate(1440,0)"><use href="#marker-template"/></g>

    <!-- row 2 -->
    <g transform="translate(0,360)"><use href="#marker-template"/></g>
    <g transform="translate(360,360)"><use href="#marker-template"/></g>
    <g transform="translate(720,360)"><use href="#marker-template"/></g>
    <g transform="translate(1080,360)"><use href="#marker-template"/></g>
    <g transform="translate(1440,360)"><use href="#marker-template"/></g>

    <!-- row 3 -->
    <g transform="translate(0,720)"><use href="#marker-template"/></g>
    <g transform="translate(360,720)"><use href="#marker-template"/></g>
    <g transform="translate(720,720)"><use href="#marker-template"/></g>
    <g transform="translate(1080,720)"><use href="#marker-template"/></g>
    <g transform="translate(1440,720)"><use href="#marker-template"/></g>

    <!-- row 4 -->
    <g transform="translate(0,1080)"><use href="#marker-template"/></g>
    <g transform="translate(360,1080)"><use href="#marker-template"/></g>
    <g transform="translate(720,1080)"><use href="#marker-template"/></g>
    <g transform="translate(1080,1080)"><use href="#marker-template"/></g>
    <g transform="translate(1440,1080)"><use href="#marker-template"/></g>
  </g>

  <text x="1275" y="3150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#333">
    Cut each square on the black edge. Each sticker should be exactly 1" x 1".
  </text>
</svg>
